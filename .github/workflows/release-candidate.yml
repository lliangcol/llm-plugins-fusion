name: Release Candidate

on:
  push:
    tags:
      - 'v*.*.*-rc.*'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: release-candidate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Trusted Candidate Ref
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      checks: read
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
      - run: npm ci --ignore-scripts
      - name: Verify immutable signed RC tag and protected main ancestry
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_CANDIDATE: '1'
        run: |
          set -euo pipefail
          test "$(git cat-file -t "refs/tags/${RELEASE_TAG}")" = "tag"
          git config gpg.format ssh
          git config gpg.ssh.allowedSignersFile .github/release-signers
          git verify-tag "${RELEASE_TAG}"
          release_commit="$(git rev-list -n 1 "${RELEASE_TAG}")"
          git fetch origin main
          git merge-base --is-ancestor "${release_commit}" origin/main
          test "${release_commit}" = "${GITHUB_SHA}"
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Candidate ${RELEASE_TAG} already exists; immutable publication refused."
            exit 1
          fi
          node scripts/prepare-release.mjs
      - name: Require independent merged-PR approval
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/verify-independent-release-review.mjs --out .metrics/candidate-preflight/independent-review.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: candidate-independent-review
          path: .metrics/candidate-preflight/independent-review.json
          include-hidden-files: true

  validate:
    name: Candidate Contracts, Tests, Coverage, And Package
    needs: preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
      - run: npm ci --ignore-scripts
      - run: npm run check:release
        env:
          NOVA_VALIDATE_WRITE_TIMINGS: '1'
      - run: npm run release:artifacts
      - run: node scripts/generate-release-checksums.mjs
      - name: Assemble validation evidence
        run: |
          mkdir -p .metrics/candidate-validation
          cp -R .metrics/release-artifacts .metrics/candidate-validation/release-artifacts
          cp .metrics/release-checksums/SHA256SUMS.txt .metrics/candidate-validation/SHA256SUMS.txt
          cp .metrics/coverage/metadata.json .metrics/candidate-validation/coverage-metadata.json
          cp .metrics/validation-timings.json .metrics/candidate-validation/validation-timings.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: candidate-validation
          path: .metrics/candidate-validation/
          include-hidden-files: true

  live:
    name: Candidate Exact-Tag Claude Validation / 2.1.205
    needs: preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
      - run: npm ci --ignore-scripts
      - run: npm install -g @anthropic-ai/claude-code@2.1.205
      - name: Validate exact candidate tag install, inventory, and route
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: >-
          node scripts/validate-plugin-install.mjs
          --accept-user-scope-mutation
          --isolated-home
          --marketplace-source "lliangcol/llm-plugins-fusion@${GITHUB_REF_NAME}"
          --expected-ref "${GITHUB_REF_NAME}"
          --inventory-out .metrics/candidate-live/inventory.json
          --route-smoke-out .metrics/candidate-live/route-smoke.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: candidate-live
          path: .metrics/candidate-live/
          include-hidden-files: true

  assemble:
    name: Bind Candidate Manifest
    needs: [preflight, validate, live]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
      - run: npm ci --ignore-scripts
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: candidate-validation
          path: .metrics/aggregate/validation
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: candidate-live
          path: .metrics/aggregate/live
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: candidate-independent-review
          path: .metrics/aggregate/review
      - name: Generate candidate manifest and immutable bundle
        run: |
          mkdir -p .metrics/candidate-bundle/artifacts .metrics/candidate-bundle/evidence
          cp .metrics/aggregate/validation/release-artifacts/* .metrics/candidate-bundle/artifacts/
          cp .metrics/aggregate/validation/SHA256SUMS.txt .metrics/candidate-bundle/evidence/SHA256SUMS.txt
          cp .metrics/aggregate/validation/coverage-metadata.json .metrics/candidate-bundle/evidence/coverage-metadata.json
          cp .metrics/aggregate/validation/validation-timings.json .metrics/candidate-bundle/evidence/validation-timings.json
          cp .metrics/aggregate/live/inventory.json .metrics/candidate-bundle/evidence/inventory.json
          cp .metrics/aggregate/live/route-smoke.json .metrics/candidate-bundle/evidence/route-smoke.json
          cp .metrics/aggregate/review/independent-review.json .metrics/candidate-bundle/evidence/independent-review.json
          node scripts/generate-release-candidate.mjs \
            --bundle-root .metrics/candidate-bundle \
            --artifact-dir .metrics/candidate-bundle/artifacts \
            --evidence .metrics/candidate-bundle/evidence/SHA256SUMS.txt \
            --evidence .metrics/candidate-bundle/evidence/coverage-metadata.json \
            --evidence .metrics/candidate-bundle/evidence/validation-timings.json \
            --evidence .metrics/candidate-bundle/evidence/inventory.json \
            --evidence .metrics/candidate-bundle/evidence/route-smoke.json \
            --evidence .metrics/candidate-bundle/evidence/independent-review.json \
            --out .metrics/candidate-bundle/release-candidate.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: candidate-bundle
          path: .metrics/candidate-bundle/
          include-hidden-files: true

  publish:
    name: Publish Immutable Prerelease Candidate
    needs: assemble
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
      - run: npm ci --ignore-scripts
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: candidate-bundle
          path: .metrics/candidate-bundle
      - name: Prepare candidate notes
        id: release
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_CANDIDATE: '1'
        run: node scripts/prepare-release.mjs
      - name: Resolve candidate archive, SBOM, and deterministic evidence bundle
        id: files
        run: |
          set -euo pipefail
          shopt -s nullglob
          archives=(.metrics/candidate-bundle/artifacts/nova-plugin-*.tar.gz)
          sboms=(.metrics/candidate-bundle/artifacts/nova-plugin-*.tar.gz.cdx.json)
          test "${#archives[@]}" -eq 1
          test "${#sboms[@]}" -eq 1
          version="${GITHUB_REF_NAME#v}"
          version="${version%%-rc.*}"
          bundle=".metrics/nova-plugin-${version}-candidate-bundle.tar.gz"
          tar --sort=name --mtime='@0' --owner=0 --group=0 --numeric-owner \
            -C .metrics/candidate-bundle -czf "${bundle}" .
          printf 'archive=%s\n' "${archives[0]}" >> "${GITHUB_OUTPUT}"
          printf 'sbom=%s\n' "${sboms[0]}" >> "${GITHUB_OUTPUT}"
          printf 'bundle=%s\n' "${bundle}" >> "${GITHUB_OUTPUT}"
      - uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: ${{ steps.files.outputs.archive }}
          sbom-path: ${{ steps.files.outputs.sbom }}
      - name: Attest candidate bundle that binds manifest, artifacts, and evidence
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: ${{ steps.files.outputs.bundle }}
      - uses: softprops/action-gh-release@7c4723f7a335432393329f8f1c564994ce50185d # v3
        with:
          name: "nova-plugin ${{ github.ref_name }}"
          body_path: ${{ steps.release.outputs.notes_file }}
          files: |
            ${{ steps.files.outputs.bundle }}
            .metrics/candidate-bundle/artifacts/*
          draft: false
          prerelease: true
