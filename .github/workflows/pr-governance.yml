name: PR Governance and Label Sync

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/labels.yml'
      - '.github/workflows/pr-governance.yml'
      - 'scripts/sync-github-labels.mjs'
      - 'scripts/lib/label-catalog.mjs'
  pull_request:
    branches: [main]
    types: [opened, edited, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, edited, dismissed]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: governance-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  governance:
    name: PR Governance
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'pull_request_review' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out trusted base governance validator
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: trusted-governance
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
      - name: Validate PR description, review budget, and sensitive-path approval
        working-directory: trusted-governance
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/validate-pr-governance.mjs

  label-sync:
    name: Label Catalog Sync
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
      issues: write
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --ignore-scripts
      - run: node scripts/sync-github-labels.mjs --apply
        env:
          GH_TOKEN: ${{ github.token }}
