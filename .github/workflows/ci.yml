name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify-agents:
    name: Verify Agents
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: bash scripts/verify-agents.sh

  validate-schemas:
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      label: Validate Schemas
      command: node scripts/validate-schemas.mjs

  validate-registry-fixtures:
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      label: Validate Registry Fixtures
      command: node scripts/validate-registry-fixtures.mjs

  validate-generated-drift:
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      label: Validate Generated Drift
      command: npm run validate:drift

  validate-packs:
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      label: Validate Capability Packs
      command: node scripts/validate-packs.mjs

  validate-claude-compat:
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      label: Validate Claude Compatibility
      command: node scripts/validate-claude-compat.mjs

  npm-test:
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      label: NPM Test
      command: npm test

  plugin-install-dry-run:
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      label: Plugin Install Dry Run
      command: node scripts/validate-plugin-install.mjs --dry-run

  lint-frontmatter:
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      label: Lint Frontmatter
      command: node scripts/lint-frontmatter.mjs

  validate-hooks:
    name: Validate Hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
      - run: node scripts/validate-hooks.mjs
      - run: bash -n nova-plugin/hooks/scripts/pre-write-check.sh
      - run: bash -n nova-plugin/hooks/scripts/post-audit-log.sh

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Run ShellCheck
        run: |
          shellcheck -x -P nova-plugin/skills/nova-codex-review-fix/scripts \
            scripts/verify-agents.sh \
            nova-plugin/hooks/scripts/pre-write-check.sh \
            nova-plugin/hooks/scripts/post-audit-log.sh \
            nova-plugin/skills/nova-codex-review-fix/scripts/codex-common.sh \
            nova-plugin/skills/nova-codex-review-fix/scripts/codex-review.sh \
            nova-plugin/skills/nova-codex-review-fix/scripts/codex-verify.sh \
            nova-plugin/skills/nova-codex-review-fix/scripts/run-project-checks.sh

  validate-github-workflows:
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      label: Validate GitHub Workflows
      command: node scripts/validate-github-workflows.mjs

  validate-runtime-smoke:
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      label: Validate Runtime Smoke
      command: node scripts/validate-runtime-smoke.mjs

  validate-surface-budget:
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      label: Validate Surface Budget
      command: node scripts/validate-surface-budget.mjs

  validate-surface-inventory:
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      label: Validate Surface Inventory
      command: node scripts/generate-surface-inventory.mjs

  scan-distribution-risk:
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      label: Scan Distribution Risk
      command: node scripts/scan-distribution-risk.mjs

  secret-scan:
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      label: Secret Scan
      command: npm run scan:secrets

  validate-regression:
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      label: Validate Regression
      command: node scripts/validate-regression.mjs

  validate-workflow-fixtures:
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      label: Validate Workflow Fixtures
      command: node scripts/validate-workflow-fixtures.mjs

  validate-docs:
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      label: Validate Docs
      command: node scripts/validate-docs.mjs

  windows-node-smoke:
    name: Windows Node Smoke
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
      - run: node scripts/validate-schemas.mjs
      - run: node scripts/validate-docs.mjs
      - run: node scripts/lint-frontmatter.mjs
      - run: .\scripts\verify-agents.ps1
        shell: pwsh

  psscriptanalyzer:
    name: PSScriptAnalyzer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force
      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: Invoke-ScriptAnalyzer -Path .\scripts\verify-agents.ps1 -Severity Warning,Error -EnableExit

  windows-bash-smoke:
    name: Windows Bash Smoke
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
      - run: bash --version
      - run: bash -n nova-plugin/hooks/scripts/pre-write-check.sh
      - run: bash -n nova-plugin/hooks/scripts/post-audit-log.sh
      - run: node scripts/validate-runtime-smoke.mjs

  macos-smoke:
    name: macOS Smoke
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
      - run: node scripts/validate-schemas.mjs
      - run: node scripts/lint-frontmatter.mjs
      - run: node scripts/validate-docs.mjs
      - run: bash scripts/verify-agents.sh
      - run: node scripts/validate-runtime-smoke.mjs
