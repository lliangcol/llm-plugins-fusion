name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  classify:
    name: CI / Classify
    runs-on: ubuntu-24.04
    outputs:
      full: ${{ steps.scope.outputs.full }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - id: scope
        name: Classify sensitive paths
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            echo "full=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git diff --name-only "$BASE_SHA" HEAD > "$RUNNER_TEMP/changed-paths.txt"
          if grep -Eq '^(\.github/|\.claude-plugin/|nova-plugin/|workflow-specs/|adapters/|schemas/|governance/|framework/|packages/|scripts/|tests/|package\.json$|package-lock\.json$)' "$RUNNER_TEMP/changed-paths.txt"; then
            echo "full=true" >> "$GITHUB_OUTPUT"
          else
            echo "full=false" >> "$GITHUB_OUTPUT"
          fi

  fast:
    name: Required / PR Fast
    needs: classify
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run ci:quick
      - run: npm run test:unit

  contracts:
    name: Required / Contracts
    needs: classify
    if: needs.classify.outputs.full == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run ci:quick
      - run: npm run validate:portable-paths
      - run: node scripts/generate-workflow-permissions.mjs
      - run: node scripts/generate-runtime-contracts.mjs
      - run: node scripts/generate-adapters.mjs
      - run: node scripts/generate-compatibility-evidence.mjs
      - run: node scripts/generate-quality-report.mjs
      - run: node scripts/validate-community-governance.mjs
      - run: node scripts/generate-surface-inventory.mjs
      - run: bash scripts/verify-agents.sh
      - run: node scripts/validate-github-workflows.mjs

  tests:
    name: Required / Tests
    needs: classify
    if: needs.classify.outputs.full == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm test
      - run: npm run test:coverage:check
      - run: npm run test:mutation:critical
      - name: Report release readiness without weakening ordinary PR integrity
        run: npm run validate:release-readiness
      - name: Collect full validation and incremental shadow selection
        if: github.event_name == 'pull_request'
        run: node scripts/validate-all.mjs --changed-since "origin/${BASE_REF}" --shadow --no-cache --write-timings
        env:
          BASE_REF: ${{ github.base_ref }}
          NOVA_RUNNER_CLASS: github-hosted
      - name: Collect full validation timings
        if: github.event_name != 'pull_request'
        run: node scripts/validate-all.mjs --full --no-cache --write-timings
        env:
          NOVA_RUNNER_CLASS: github-hosted
      - run: node scripts/generate-validation-timing-trend.mjs --input .metrics/validation-timings.json --output .metrics/validation-timing-trend.json
      - name: Upload coverage evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-coverage-evidence
          path: .metrics/coverage/
          include-hidden-files: true
      - name: Upload validation timing trend
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: validation-timing-trend
          path: |
            .metrics/validation-timing-trend.json
            .metrics/validation-timings.json
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 90

  security:
    name: Required / Security
    needs: classify
    if: needs.classify.outputs.full == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    env:
      SHELLCHECK_VERSION: 0.11.0
      SHELLCHECK_SHA256: 8c3be12b05d5c177a04c29e3c78ce89ac86f1595681cab149b65b97c4e227198
      ACTIONLINT_VERSION: 1.7.12
      ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Install ShellCheck
        run: |
          archive="$RUNNER_TEMP/shellcheck.tar.xz"
          curl -fsSL "https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/shellcheck-v${SHELLCHECK_VERSION}.linux.x86_64.tar.xz" -o "$archive"
          echo "${SHELLCHECK_SHA256}  ${archive}" | sha256sum --check --strict
          tar -xJf "$archive" -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/shellcheck-v${SHELLCHECK_VERSION}" >> "$GITHUB_PATH"
      - name: Install actionlint
        run: |
          archive="$RUNNER_TEMP/actionlint.tar.gz"
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" -o "$archive"
          echo "${ACTIONLINT_SHA256}  ${archive}" | sha256sum --check --strict
          tar -xzf "$archive" -C "$RUNNER_TEMP" actionlint
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
      - run: npm run typecheck
      - run: npm run lint:shell
      - run: npm run lint:actions
      - run: node scripts/validate-hooks.mjs
      - run: npm run test:fault-injection
      - run: npm run scan:secrets
      - run: node scripts/scan-distribution-risk.mjs --sarif .metrics/distribution-risk.sarif
      - name: Upload distribution risk SARIF
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: .metrics/distribution-risk.sarif

  platform:
    name: Required / Platform (${{ matrix.label }})
    needs: classify
    if: needs.classify.outputs.full == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-24.04, node: '22', label: Linux Node 22 }
          - { os: ubuntu-24.04, node: '24', label: Linux Node 24 }
          - { os: windows-latest, node: '22', label: Windows Node 22 }
          - { os: macos-latest, node: '22', label: macOS Node 22 }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run ci:quick
      - run: npm run validate:portable-paths
      - if: runner.os == 'Windows'
        run: node scripts/generate-runtime-contracts.mjs && node scripts/generate-adapters.mjs && node scripts/generate-compatibility-evidence.mjs && node scripts/generate-quality-report.mjs
      - if: runner.os != 'Windows'
        run: bash scripts/verify-agents.sh
      - if: runner.os == 'Windows'
        run: .\scripts\verify-agents.ps1
        shell: pwsh
      - if: runner.os == 'Windows'
        run: bash -n nova-plugin/hooks/scripts/pre-write-check.sh && bash -n nova-plugin/hooks/scripts/pre-bash-check.sh && bash -n nova-plugin/hooks/scripts/trusted-node-hook.sh && bash -n nova-plugin/hooks/scripts/post-audit-log.sh
        shell: bash
      - if: runner.os == 'Windows'
        run: node scripts/validate-runtime-smoke.mjs
      - if: runner.os == 'macOS'
        run: /bin/bash nova-plugin/skills/nova-codex-review-fix/scripts/run-project-checks.sh --test-only

  package:
    name: Required / Package
    needs: classify
    if: needs.classify.outputs.full == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --ignore-scripts
      - run: node scripts/validate-plugin-install.mjs --dry-run
      - run: node scripts/build-release-artifacts.mjs
      - run: gzip -t .metrics/release-artifacts/*.tar.gz && tar -tzf .metrics/release-artifacts/*.tar.gz >/dev/null
      - run: cp -R .metrics/release-artifacts .metrics/release-artifacts-first
      - run: node scripts/build-release-artifacts.mjs
      - run: diff -ru .metrics/release-artifacts-first .metrics/release-artifacts

  live-evidence:
    name: Conditional / Evidence Registry Integrity
    needs: classify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --ignore-scripts
      - run: node scripts/validate-assistant-evidence.mjs

  aggregate:
    name: Required / Aggregate
    if: always()
    needs: [classify, fast, contracts, tests, security, platform, package, live-evidence]
    runs-on: ubuntu-24.04
    steps:
      - name: Verify required results
        env:
          REQUIRED_RESULTS: ${{ toJson(needs) }}
        run: |
          node -e 'const needs=JSON.parse(process.env.REQUIRED_RESULTS); const full=needs.classify?.outputs?.full==="true"; const always=["classify","fast"]; const gated=["contracts","tests","security","platform","package"]; const bad=[...always.filter(id=>needs[id]?.result!=="success"),...gated.filter(id=>full?needs[id]?.result!=="success":! ["success","skipped"].includes(needs[id]?.result))]; const live=needs["live-evidence"]?.result; if(bad.length||!["success","skipped"].includes(live)){console.error({bad,live,full});process.exit(1)}'
