name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-agents:
    name: Verify Agents
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/verify-agents.sh

  validate-schemas:
    name: Validate Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/validate-schemas.mjs

  validate-registry-fixtures:
    name: Validate Registry Fixtures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/validate-registry-fixtures.mjs

  validate-packs:
    name: Validate Capability Packs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/validate-packs.mjs

  validate-claude-compat:
    name: Validate Claude Compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/validate-claude-compat.mjs

  plugin-install-smoke:
    name: Plugin Install Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g @anthropic-ai/claude-code
      - run: node scripts/validate-plugin-install.mjs

  lint-frontmatter:
    name: Lint Frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/lint-frontmatter.mjs

  validate-hooks:
    name: Validate Hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/validate-hooks.mjs
      - run: bash -n nova-plugin/hooks/scripts/pre-write-check.sh
      - run: bash -n nova-plugin/hooks/scripts/post-audit-log.sh

  validate-runtime-smoke:
    name: Validate Runtime Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/validate-runtime-smoke.mjs

  validate-surface-budget:
    name: Validate Surface Budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/validate-surface-budget.mjs

  scan-distribution-risk:
    name: Scan Distribution Risk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/scan-distribution-risk.mjs

  validate-regression:
    name: Validate Regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/validate-regression.mjs

  validate-docs:
    name: Validate Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/validate-docs.mjs

  windows-node-smoke:
    name: Windows Node Smoke
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/validate-schemas.mjs
      - run: node scripts/validate-docs.mjs
      - run: node scripts/lint-frontmatter.mjs
      - run: .\scripts\verify-agents.ps1
        shell: pwsh
