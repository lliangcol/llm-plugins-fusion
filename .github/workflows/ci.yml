name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Required / Contracts
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
      - run: npm run ci:quick
      - run: node scripts/generate-workflow-permissions.mjs
      - run: node scripts/generate-workflow-v2-compat.mjs
      - run: node scripts/generate-runtime-contracts.mjs
      - run: node scripts/generate-adapters.mjs
      - run: node scripts/generate-compatibility-evidence.mjs
      - run: node scripts/generate-quality-report.mjs
      - run: node scripts/validate-community-governance.mjs
      - run: node scripts/generate-surface-inventory.mjs
      - run: bash scripts/verify-agents.sh
      - run: node scripts/validate-github-workflows.mjs

  tests:
    name: Required / Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
      - run: npm test
      - run: npm run test:coverage:check
      - run: npm run test:mutation:critical
      - name: Upload coverage evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-coverage-evidence
          path: .metrics/coverage/
          include-hidden-files: true

  security:
    name: Required / Security
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    env:
      SHELLCHECK_VERSION: 0.11.0
      SHELLCHECK_SHA256: 8c3be12b05d5c177a04c29e3c78ce89ac86f1595681cab149b65b97c4e227198
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
      - name: Install ShellCheck
        run: |
          archive="$RUNNER_TEMP/shellcheck.tar.xz"
          curl -fsSL "https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/shellcheck-v${SHELLCHECK_VERSION}.linux.x86_64.tar.xz" -o "$archive"
          echo "${SHELLCHECK_SHA256}  ${archive}" | sha256sum --check --strict
          tar -xJf "$archive" -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/shellcheck-v${SHELLCHECK_VERSION}" >> "$GITHUB_PATH"
      - run: shellcheck -x -P nova-plugin/skills/nova-codex-review-fix/scripts scripts/verify-agents.sh nova-plugin/hooks/scripts/*.sh nova-plugin/skills/nova-codex-review-fix/scripts/*.sh
      - run: node scripts/validate-hooks.mjs
      - run: npm run test:fault-injection
      - run: npm run scan:secrets
      - run: node scripts/scan-distribution-risk.mjs --sarif .metrics/distribution-risk.sarif
      - name: Upload distribution risk SARIF
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: github/codeql-action/upload-sarif@1ad29ea4a422cce9a242a9fae469541dcd08addc # v4
        with:
          sarif_file: .metrics/distribution-risk.sarif

  platform:
    name: Required / Platform (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-24.04, node: '22', label: Linux Node 22 }
          - { os: ubuntu-24.04, node: '24', label: Linux Node 24 }
          - { os: windows-latest, node: '22', label: Windows Node 22 }
          - { os: macos-latest, node: '22', label: macOS Node 22 }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}
      - run: npm run ci:quick
      - if: runner.os != 'Windows'
        run: bash scripts/verify-agents.sh
      - if: runner.os == 'Windows'
        run: .\scripts\verify-agents.ps1
        shell: pwsh
      - if: runner.os == 'Windows'
        run: bash -n nova-plugin/hooks/scripts/pre-write-check.sh && bash -n nova-plugin/hooks/scripts/post-audit-log.sh
        shell: bash
      - if: runner.os == 'macOS'
        run: /bin/bash nova-plugin/skills/nova-codex-review-fix/scripts/run-project-checks.sh --test-only

  package:
    name: Required / Package
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
      - run: node scripts/validate-plugin-install.mjs --dry-run
      - run: node scripts/build-release-artifacts.mjs
      - run: gzip -t .metrics/release-artifacts/*.tar.gz && tar -tzf .metrics/release-artifacts/*.tar.gz >/dev/null
      - run: cp -R .metrics/release-artifacts .metrics/release-artifacts-first
      - run: node scripts/build-release-artifacts.mjs
      - run: diff -ru .metrics/release-artifacts-first .metrics/release-artifacts

  live-evidence:
    name: Conditional / Live Evidence
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
      - run: node scripts/validate-assistant-evidence.mjs

  aggregate:
    name: Required / Aggregate
    if: always()
    needs: [contracts, tests, security, platform, package, live-evidence]
    runs-on: ubuntu-24.04
    steps:
      - name: Verify required results
        env:
          REQUIRED_RESULTS: ${{ toJson(needs) }}
        run: |
          node -e 'const needs=JSON.parse(process.env.REQUIRED_RESULTS); const bad=Object.entries(needs).filter(([id,v])=>id!=="live-evidence"&&v.result!=="success"); if(bad.length){console.error(bad);process.exit(1)} const live=needs["live-evidence"]?.result; if(!["success","skipped"].includes(live)){process.exit(1)}'
