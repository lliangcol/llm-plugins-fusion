name: Promote Verified Release Candidate

on:
  workflow_call:
    inputs:
      release-tag:
        description: Exact signed immutable stable tag
        required: true
        type: string
      candidate-tag:
        description: Exact signed immutable candidate tag
        required: true
        type: string

permissions:
  contents: read

jobs:
  promote:
    name: Promote Exact Candidate Through Release State Machine
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    environment: release
    permissions:
      contents: write
      checks: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.release-tag }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
      - run: npm ci --ignore-scripts
      - name: Verify explicit signed tag identity
        id: identity
        env:
          STABLE_TAG: ${{ inputs.release-tag }}
          CANDIDATE_TAG: ${{ inputs.candidate-tag }}
        run: |
          set -euo pipefail
          git fetch origin "refs/tags/${CANDIDATE_TAG}:refs/tags/${CANDIDATE_TAG}"
          git config gpg.format ssh
          git config gpg.ssh.allowedSignersFile .github/release-signers
          test "$(git cat-file -t "refs/tags/${STABLE_TAG}")" = tag
          test "$(git cat-file -t "refs/tags/${CANDIDATE_TAG}")" = tag
          git verify-tag "${STABLE_TAG}"
          git verify-tag "${CANDIDATE_TAG}"
          stable_commit="$(git rev-list -n 1 "${STABLE_TAG}")"
          test "${stable_commit}" = "$(git rev-list -n 1 "${CANDIDATE_TAG}")"
          test "${stable_commit}" = "$(git rev-parse HEAD)"
          printf 'commit=%s\n' "${stable_commit}" >> "${GITHUB_OUTPUT}"
      - name: Download exact authenticated candidate bundle
        env:
          GH_TOKEN: ${{ github.token }}
          CANDIDATE_TAG: ${{ inputs.candidate-tag }}
          SOURCE_COMMIT: ${{ steps.identity.outputs.commit }}
        run: |
          set -euo pipefail
          mkdir -p .metrics/promotion/download .metrics/promotion/bundle
          gh release download "${CANDIDATE_TAG}" --dir .metrics/promotion/download --pattern 'nova-plugin-*-candidate-bundle.tar.gz'
          shopt -s nullglob
          bundles=(.metrics/promotion/download/nova-plugin-*-candidate-bundle.tar.gz)
          test "${#bundles[@]}" -eq 1
          bundle="${bundles[0]}"
          gh attestation verify "${bundle}" --repo "${GITHUB_REPOSITORY}" --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/release-candidate.yml" --source-ref "refs/tags/${CANDIDATE_TAG}" --source-digest "${SOURCE_COMMIT}"
          node scripts/extract-release-bundle.mjs --archive "${bundle}" --out .metrics/promotion/bundle
          cp "${bundle}" .metrics/promotion/candidate-bundle.tar.gz
      - name: Verify candidate envelope, intent, control, evidence, and artifacts
        env:
          STABLE_TAG: ${{ inputs.release-tag }}
          CANDIDATE_TAG: ${{ inputs.candidate-tag }}
          SOURCE_COMMIT: ${{ steps.identity.outputs.commit }}
        run: |
          node scripts/verify-release-promotion.mjs \
            --stable-tag "${STABLE_TAG}" \
            --candidate-tag "${CANDIDATE_TAG}" \
            --commit "${SOURCE_COMMIT}" \
            --manifest .metrics/promotion/bundle/release-candidate.json \
            --candidate-core .metrics/promotion/bundle/candidate-core.json \
            --promotion-intent .metrics/promotion/bundle/promotion-intent.json \
            --control-bundle-manifest .metrics/promotion/bundle/release-control-bundle.manifest.json \
            --bundle-root .metrics/promotion/bundle \
            --artifact-dir .metrics/promotion/bundle/artifacts
          node scripts/release-orchestrator.mjs --mode promote --state PROMOTION_READY --target-state ASSETS_RECONCILED \
            --stable-tag "${STABLE_TAG}" --candidate-tag "${CANDIDATE_TAG}" --source-commit "${SOURCE_COMMIT}" \
            --promotion-intent .metrics/promotion/bundle/promotion-intent.json \
            --control-bundle .metrics/promotion/bundle/release-control-bundle.manifest.json \
            --event-dir .metrics/promotion/events/pre-publish --run-id "${GITHUB_RUN_ID}"
      - name: Prepare draft release asset inventory
        env:
          RELEASE_TAG: ${{ inputs.release-tag }}
        run: |
          set -euo pipefail
          node scripts/prepare-release.mjs
          mkdir -p .metrics/promotion/publish
          cp .metrics/promotion/candidate-bundle.tar.gz .metrics/promotion/publish/
          cp .metrics/promotion/bundle/artifacts/* .metrics/promotion/publish/
          cp .metrics/promotion/bundle/evidence/* .metrics/promotion/publish/
          cp .metrics/promotion/bundle/candidate-core.json .metrics/promotion/publish/
          cp .metrics/promotion/bundle/promotion-intent.json .metrics/promotion/publish/
          cp .metrics/promotion/bundle/release-candidate.json .metrics/promotion/publish/
          cp .metrics/promotion/bundle/release-control-bundle.* .metrics/promotion/publish/
      - name: Resolve promoted archive and build SBOM
        id: release-files
        run: |
          shopt -s nullglob
          archives=(.metrics/promotion/publish/nova-plugin-*.tar.gz)
          filtered=()
          for archive in "${archives[@]}"; do [[ "${archive}" == *candidate-bundle* ]] || filtered+=("${archive}"); done
          test "${#filtered[@]}" -eq 1
          archive="${filtered[0]}"
          printf 'archive=%s\n' "${archive}" >> "${GITHUB_OUTPUT}"
          printf 'sbom=%s\n' '.metrics/promotion/publish/build-sbom.cdx.json' >> "${GITHUB_OUTPUT}"
      - name: Attest promoted archive and build SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: ${{ steps.release-files.outputs.archive }}
          sbom-path: ${{ steps.release-files.outputs.sbom }}
      - name: Draft, reconcile, verify, and publish release transaction
        env:
          GH_TOKEN: ${{ github.token }}
          STABLE_TAG: ${{ inputs.release-tag }}
        run: node scripts/reconcile-github-release.mjs --tag "${STABLE_TAG}" --assets-dir .metrics/promotion/publish --notes .metrics/release/release-notes.md
      - name: Record release published transition
        env:
          STABLE_TAG: ${{ inputs.release-tag }}
          CANDIDATE_TAG: ${{ inputs.candidate-tag }}
          SOURCE_COMMIT: ${{ steps.identity.outputs.commit }}
        run: |
          node scripts/release-orchestrator.mjs --mode promote --state ASSETS_RECONCILED --target-state RELEASE_PUBLISHED \
            --stable-tag "${STABLE_TAG}" --candidate-tag "${CANDIDATE_TAG}" --source-commit "${SOURCE_COMMIT}" \
            --promotion-intent .metrics/promotion/bundle/promotion-intent.json \
            --control-bundle .metrics/promotion/bundle/release-control-bundle.manifest.json \
            --event-dir .metrics/promotion/events/published --run-id "${GITHUB_RUN_ID}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: release-state-events-${{ inputs.release-tag }}
          path: .metrics/promotion/events/
