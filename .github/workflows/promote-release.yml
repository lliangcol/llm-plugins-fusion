name: Promote Verified Release Candidate

on:
  workflow_call:
    inputs:
      release-tag:
        description: Exact signed immutable stable tag
        required: true
        type: string
      candidate-tag:
        description: Exact signed immutable candidate tag
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify:
    name: Verify Exact Candidate And Build Digest-Bound Handoff
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions:
      contents: read
      checks: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ job.workflow_sha }}
      - name: Verify explicit signed tag identity before repository code
        id: identity
        env:
          STABLE_TAG: ${{ inputs.release-tag }}
          CANDIDATE_TAG: ${{ inputs.candidate-tag }}
          EVENT_NAME: ${{ github.event_name }}
          TRIGGER_REF: ${{ github.ref }}
          PROMOTION_WORKFLOW_REF: ${{ job.workflow_ref }}
          PROMOTION_WORKFLOW_COMMIT: ${{ job.workflow_sha }}
        run: |
          set -euo pipefail
          test "${EVENT_NAME}" = repository_dispatch
          test "${TRIGGER_REF}" = refs/heads/main
          test "${PROMOTION_WORKFLOW_REF}" = "${GITHUB_REPOSITORY}/.github/workflows/promote-release.yml@refs/heads/main"
          if [[ ! "${STABLE_TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::invalid stable release tag: ${STABLE_TAG}" >&2
            exit 1
          fi
          if [[ ! "${CANDIDATE_TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)-rc\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::invalid candidate release tag: ${CANDIDATE_TAG}" >&2
            exit 1
          fi
          if [[ "${CANDIDATE_TAG%%-rc.*}" != "${STABLE_TAG}" ]]; then
            echo "::error::candidate tag base must equal stable tag" >&2
            exit 1
          fi
          git fetch --no-tags origin refs/heads/main:refs/remotes/origin/main
          git merge-base --is-ancestor "${PROMOTION_WORKFLOW_COMMIT}" origin/main
          git fetch --no-tags origin "refs/tags/${STABLE_TAG}:refs/tags/${STABLE_TAG}"
          git fetch --no-tags origin "refs/tags/${CANDIDATE_TAG}:refs/tags/${CANDIDATE_TAG}"
          mkdir -p "${RUNNER_TEMP}/promotion-trust"
          git show origin/main:.github/release-signers > "${RUNNER_TEMP}/promotion-trust/release-signers"
          test -s "${RUNNER_TEMP}/promotion-trust/release-signers"
          git config gpg.format ssh
          git config gpg.ssh.allowedSignersFile "${RUNNER_TEMP}/promotion-trust/release-signers"
          test "$(git cat-file -t "refs/tags/${STABLE_TAG}")" = tag
          test "$(git cat-file -t "refs/tags/${CANDIDATE_TAG}")" = tag
          git verify-tag "${STABLE_TAG}"
          git verify-tag "${CANDIDATE_TAG}"
          stable_commit="$(git rev-list -n 1 "${STABLE_TAG}")"
          test "${stable_commit}" = "$(git rev-list -n 1 "${CANDIDATE_TAG}")"
          git merge-base --is-ancestor "${stable_commit}" origin/main
          git checkout --detach "${stable_commit}"
          printf 'commit=%s\n' "${stable_commit}" >> "${GITHUB_OUTPUT}"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --ignore-scripts
      - run: node scripts/validate-release-operational-readiness.mjs --mode promote
      - name: Download and verify exact candidate evidence bundle
        env:
          GH_TOKEN: ${{ github.token }}
          CANDIDATE_TAG: ${{ inputs.candidate-tag }}
          SOURCE_COMMIT: ${{ steps.identity.outputs.commit }}
        run: |
          set -euo pipefail
          mkdir -p .metrics/promotion/download .metrics/promotion/bundle
          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${CANDIDATE_TAG}" > .metrics/promotion/candidate-release-metadata.json
          gh release download "${CANDIDATE_TAG}" --dir .metrics/promotion/download --pattern 'nova-plugin-*-evidence-bundle.tar.gz'
          shopt -s nullglob
          bundles=(.metrics/promotion/download/nova-plugin-*-evidence-bundle.tar.gz)
          test "${#bundles[@]}" -eq 1
          bundle="${bundles[0]}"
          gh attestation verify "${bundle}" --repo "${GITHUB_REPOSITORY}" \
            --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/release-candidate.yml" \
            --source-ref refs/heads/main --deny-self-hosted-runners
          node scripts/extract-release-bundle.mjs --archive "${bundle}" --out .metrics/promotion/bundle
          builder_workflow_commit="$(node -e 'const fs=require("fs"); const core=JSON.parse(fs.readFileSync(".metrics/promotion/bundle/candidate-core.json")); const sha=core.candidate?.workflowSourceCommit; if(!/^[a-f0-9]{40}$/.test(sha??"")) process.exit(1); process.stdout.write(sha)')"
          git merge-base --is-ancestor "${builder_workflow_commit}" origin/main
          gh attestation verify "${bundle}" --repo "${GITHUB_REPOSITORY}" \
            --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/release-candidate.yml" \
            --source-ref refs/heads/main --source-digest "${builder_workflow_commit}" \
            --signer-digest "${builder_workflow_commit}" --deny-self-hosted-runners
          cp "${bundle}" .metrics/promotion/candidate-evidence-bundle.tar.gz
      - name: Verify candidate envelope, intent, control, evidence, and artifacts
        env:
          STABLE_TAG: ${{ inputs.release-tag }}
          CANDIDATE_TAG: ${{ inputs.candidate-tag }}
          SOURCE_COMMIT: ${{ steps.identity.outputs.commit }}
        run: |
          node scripts/verify-release-promotion.mjs \
            --stable-tag "${STABLE_TAG}" --candidate-tag "${CANDIDATE_TAG}" --repository "${GITHUB_REPOSITORY}" --commit "${SOURCE_COMMIT}" \
            --manifest .metrics/promotion/bundle/release-candidate.json \
            --candidate-core .metrics/promotion/bundle/candidate-core.json \
            --promotion-intent .metrics/promotion/bundle/promotion-intent.json \
            --control-bundle-manifest .metrics/promotion/bundle/release-control-bundle.manifest.json \
            --candidate-release-metadata .metrics/promotion/candidate-release-metadata.json \
            --observation-evidence-out .metrics/promotion/candidate-observation.json \
            --bundle-root .metrics/promotion/bundle --artifact-dir .metrics/promotion/bundle/artifacts
          node scripts/release-orchestrator.mjs --candidate-verification-passed --mode promote --state DRAFT --target-state ASSETS_RECONCILED \
            --stable-tag "${STABLE_TAG}" --candidate-tag "${CANDIDATE_TAG}" --source-commit "${SOURCE_COMMIT}" \
            --promotion-intent .metrics/promotion/bundle/promotion-intent.json \
            --control-bundle .metrics/promotion/bundle/release-control-bundle.manifest.json \
            --event-dir .metrics/promotion/events --run-id "${GITHUB_RUN_ID}"
      - name: Prepare immutable publication handoff
        env:
          RELEASE_TAG: ${{ inputs.release-tag }}
          RELEASE_PROMOTION: '1'
          CANDIDATE_TAG: ${{ inputs.candidate-tag }}
          SOURCE_COMMIT: ${{ steps.identity.outputs.commit }}
        run: |
          set -euo pipefail
          node scripts/prepare-release.mjs
          handoff=.metrics/promotion/handoff
          mkdir -p "${handoff}/publish" "${handoff}/scripts/lib" "${handoff}/events" "${handoff}/governance/evidence"
          cp .metrics/promotion/candidate-evidence-bundle.tar.gz "${handoff}/publish/nova-plugin-${RELEASE_TAG#v}-evidence-bundle.tar.gz"
          cp .metrics/promotion/bundle/artifacts/nova-plugin-*.tar.gz "${handoff}/publish/"
          (cd "${handoff}/publish" && sha256sum nova-plugin-*.tar.gz | LC_ALL=C sort > SHA256SUMS.txt)
          test "$(find "${handoff}/publish" -maxdepth 1 -type f | wc -l | tr -d ' ')" -eq 3
          cp .metrics/release/release-notes.md "${handoff}/release-notes.md"
          cp .metrics/promotion/bundle/promotion-intent.json .metrics/promotion/bundle/release-control-bundle.manifest.json "${handoff}/"
          cp .metrics/promotion/candidate-observation.json "${handoff}/"
          cp .metrics/promotion/events/* "${handoff}/events/"
          cp scripts/reconcile-github-release.mjs scripts/release-orchestrator.mjs "${handoff}/scripts/"
          cp scripts/lib/canonical-json.mjs scripts/lib/cli-args.mjs scripts/lib/release-state-machine.mjs scripts/lib/release-corrections.mjs "${handoff}/scripts/lib/"
          cp governance/release-corrections.json "${handoff}/governance/"
          cp governance/evidence/*.md "${handoff}/governance/evidence/"
          checksum_file="${RUNNER_TEMP}/promotion-handoff.sha256"
          (cd "${handoff}" && find . -type f ! -name handoff.sha256 -print0 | sort -z | xargs -0 sha256sum > "${checksum_file}")
          mv "${checksum_file}" "${handoff}/handoff.sha256"
      - name: Resolve promoted archive and build SBOM
        id: release-files
        run: |
          shopt -s nullglob
          archives=(.metrics/promotion/handoff/publish/nova-plugin-*.tar.gz)
          bundles=(.metrics/promotion/handoff/publish/nova-plugin-*-evidence-bundle.tar.gz)
          filtered=()
          for archive in "${archives[@]}"; do [[ "${archive}" == *evidence-bundle* ]] || filtered+=("${archive}"); done
          test "${#filtered[@]}" -eq 1
          test "${#bundles[@]}" -eq 1
          {
            printf 'archive=%s\n' "${filtered[0]}"
            printf 'sbom=%s\n' '.metrics/promotion/bundle/artifacts/build-sbom.cdx.json'
            printf 'bundle=%s\n' "${bundles[0]}"
          } >> "${GITHUB_OUTPUT}"
      - name: Attest promoted archive and build SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: ${{ steps.release-files.outputs.archive }}
          sbom-path: ${{ steps.release-files.outputs.sbom }}
      - name: Attest promoted evidence bundle
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: ${{ steps.release-files.outputs.bundle }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: verified-promotion-handoff-${{ inputs.release-tag }}
          path: .metrics/promotion/handoff/
          include-hidden-files: true
          if-no-files-found: error

  publish:
    name: Publish Exact Verified Handoff
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: verified-promotion-handoff-${{ inputs.release-tag }}
          path: handoff
      - name: Verify digest-bound handoff
        run: cd handoff && sha256sum -c handoff.sha256
      - name: Publish release transaction
        env:
          GH_TOKEN: ${{ github.token }}
          STABLE_TAG: ${{ inputs.release-tag }}
          CANDIDATE_TAG: ${{ inputs.candidate-tag }}
        run: |
          set -euo pipefail
          source_commit="$(node -e "const i=require('./handoff/promotion-intent.json'); process.stdout.write(i.sourceCommit)")"
          node handoff/scripts/release-orchestrator.mjs --dry-run --candidate-verification-passed --protected-publication-approved --mode promote --state ASSETS_RECONCILED --target-state RELEASE_PUBLISHED \
            --stable-tag "${STABLE_TAG}" --candidate-tag "${CANDIDATE_TAG}" --source-commit "${source_commit}" \
            --promotion-intent handoff/promotion-intent.json --control-bundle handoff/release-control-bundle.manifest.json \
            --event-dir handoff/events --run-id "${GITHUB_RUN_ID}"
          node handoff/scripts/reconcile-github-release.mjs --tag "${STABLE_TAG}" --assets-dir handoff/publish --notes handoff/release-notes.md
          node handoff/scripts/release-orchestrator.mjs --candidate-verification-passed --protected-publication-approved --mode promote --state ASSETS_RECONCILED --target-state RELEASE_PUBLISHED \
            --stable-tag "${STABLE_TAG}" --candidate-tag "${CANDIDATE_TAG}" --source-commit "${source_commit}" \
            --promotion-intent handoff/promotion-intent.json --control-bundle handoff/release-control-bundle.manifest.json \
            --event-dir handoff/events --run-id "${GITHUB_RUN_ID}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: release-state-events-${{ inputs.release-tag }}
          path: handoff/events/
          include-hidden-files: true
          if-no-files-found: error
