name: Stable Release Trigger

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      stable-tag:
        description: Existing signed immutable stable tag to recover
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: stable-release-${{ inputs.stable-tag || github.ref }}
  cancel-in-progress: false

jobs:
  promote:
    if: ${{ github.event_name == 'push' && !contains(github.ref_name, '-') }}
    uses: ./.github/workflows/promote-release.yml
    permissions:
      contents: write
      checks: read
      id-token: write
      attestations: write
    secrets: inherit

  recover:
    if: ${{ github.event_name == 'workflow_dispatch' && startsWith(inputs.stable-tag, 'v') && !contains(inputs.stable-tag, '-') }}
    uses: ./.github/workflows/promote-release.yml
    with:
      release-tag: ${{ inputs.stable-tag }}
    permissions:
      contents: write
      checks: read
      id-token: write
      attestations: write
    secrets: inherit
