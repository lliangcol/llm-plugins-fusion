name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  validate:
    name: Pre-release Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
      - name: Maintainer validation
        env:
          NOVA_VALIDATE_WRITE_TIMINGS: '1'
        run: npm run validate:maintainer
      - name: Test coverage evidence
        run: npm run test:coverage:check
      - name: Release checksum evidence
        run: node scripts/generate-release-checksums.mjs
      - name: Plugin install dry run
        run: node scripts/validate-plugin-install.mjs --dry-run
      - name: Write release validation evidence
        if: always()
        run: |
          mkdir -p .codex .metrics/release-validation
          {
            echo "# Release Validation Evidence"
            echo
            echo "- workflow: ${GITHUB_WORKFLOW}"
            echo "- run_id: ${GITHUB_RUN_ID}"
            echo "- ref: ${GITHUB_REF}"
            echo "- sha: ${GITHUB_SHA}"
            echo "- generated_at: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo
            echo "## Commands"
            echo
            echo '```text'
            echo "NOVA_VALIDATE_WRITE_TIMINGS=1 npm run validate:maintainer"
            echo "npm run test:coverage:check"
            echo "node scripts/generate-release-checksums.mjs"
            echo "node scripts/validate-plugin-install.mjs --dry-run"
            echo '```'
            if [ -f .metrics/validation-timings.json ]; then
              echo
              echo "## Validation Timings"
              echo
              echo '```json'
              cat .metrics/validation-timings.json
              echo '```'
            fi
            if [ -f .metrics/coverage/coverage-summary.txt ]; then
              echo
              echo "## Test Coverage"
              echo
              echo '```text'
              cat .metrics/coverage/coverage-summary.txt
              echo '```'
            fi
            if [ -f .metrics/release-checksums/SHA256SUMS.txt ]; then
              echo
              echo "## Release Checksums"
              echo
              echo '```text'
              cat .metrics/release-checksums/SHA256SUMS.txt
              echo '```'
            fi
          } > .codex/release-validation-evidence.md
      - name: Upload release validation evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-validation-evidence
          path: |
            .codex/release-validation-evidence.md
            .metrics/validation-timings.json
            .metrics/coverage/
            .metrics/release-checksums/

  isolated-install-smoke:
    name: Isolated Install Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Validate user-scope install path
        run: node scripts/validate-plugin-install.mjs --accept-user-scope-mutation --isolated-home
      - name: Record isolated install smoke evidence
        if: always()
        run: |
          mkdir -p .metrics/release-install-smoke
          PLUGIN_VERSION="$(node -e "process.stdout.write(require('./nova-plugin/.claude-plugin/plugin.json').version)")"
          {
            echo "workflow=${GITHUB_WORKFLOW}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "ref=${GITHUB_REF}"
            echo "tag=${GITHUB_REF_NAME}"
            echo "sha=${GITHUB_SHA}"
            echo "plugin_version=${PLUGIN_VERSION}"
            echo "runner=${RUNNER_NAME}"
            echo "mutates_user_scope=true"
            echo "scope=disposable GitHub-hosted runner"
            echo "isolated_home=true"
            date -u +"completed_at=%Y-%m-%dT%H:%M:%SZ"
          } > .metrics/release-install-smoke/context.txt
      - name: Upload isolated install smoke evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-install-smoke-evidence
          path: .metrics/release-install-smoke/

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - validate
      - isolated-install-smoke
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
      - name: Prepare validated release metadata
        id: release
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: node scripts/prepare-release.mjs
      - name: Generate release checksums
        run: node scripts/generate-release-checksums.mjs
      - name: Create GitHub Release
        uses: softprops/action-gh-release@7c4723f7a335432393329f8f1c564994ce50185d # v3
        with:
          name: "nova-plugin v${{ steps.release.outputs.version }}"
          body_path: ${{ steps.release.outputs.notes_file }}
          files: .metrics/release-checksums/SHA256SUMS.txt
          draft: false
          prerelease: ${{ steps.release.outputs.prerelease }}
