name: Stable Release Trigger

on:
  repository_dispatch:
    types: [promote-release]

run-name: Promote ${{ github.event.client_payload.candidate_tag }} to ${{ github.event.client_payload.stable_tag }} from protected main

permissions:
  contents: read

concurrency:
  group: stable-release-${{ github.event.client_payload.stable_tag }}-${{ github.event.client_payload.candidate_tag }}
  cancel-in-progress: false

jobs:
  recover:
    uses: ./.github/workflows/promote-release.yml
    with:
      release-tag: ${{ github.event.client_payload.stable_tag }}
      candidate-tag: ${{ github.event.client_payload.candidate_tag }}
    permissions:
      contents: write
      checks: read
      id-token: write
      attestations: write
