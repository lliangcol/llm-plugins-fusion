name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  validate:
    name: Pre-release Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
      - name: Maintainer validation
        env:
          NOVA_VALIDATE_WRITE_TIMINGS: '1'
        run: npm run validate:maintainer
      - name: Test coverage evidence
        run: npm run test:coverage:check
      - name: Release checksum evidence
        run: node scripts/generate-release-checksums.mjs
      - name: Plugin install dry run
        run: node scripts/validate-plugin-install.mjs --dry-run
      - name: Prepare machine-readable validation inputs
        run: |
          mkdir -p .metrics/release-inputs
          cp .metrics/validation-timings.json .metrics/release-inputs/validation-timings.json
          cp .metrics/coverage/coverage-summary.txt .metrics/release-inputs/coverage-summary.txt
          cp .metrics/coverage/metadata.json .metrics/release-inputs/coverage-metadata.json
          cp .metrics/release-checksums/SHA256SUMS.txt .metrics/release-inputs/SHA256SUMS.txt
      - name: Upload release validation inputs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-validation-inputs
          path: .metrics/release-inputs/
          include-hidden-files: true

  claude-live-validation:
    name: Claude Live Validation / known-good 2.1.205
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code@2.1.205
      - name: Validate exact-tag install, inventory, and route
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: >-
          node scripts/validate-plugin-install.mjs
          --accept-user-scope-mutation
          --isolated-home
          --marketplace-source "lliangcol/llm-plugins-fusion@${GITHUB_REF_NAME}"
          --expected-ref "${GITHUB_REF_NAME}"
          --inventory-out .metrics/release-install-smoke/inventory.json
          --route-smoke-out .metrics/release-install-smoke/route-smoke.json
      - name: Record isolated install smoke evidence
        if: always()
        run: |
          mkdir -p .metrics/release-install-smoke
          PLUGIN_VERSION="$(node -e "process.stdout.write(require('./nova-plugin/.claude-plugin/plugin.json').version)")"
          {
            echo "workflow=${GITHUB_WORKFLOW}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "ref=${GITHUB_REF}"
            echo "tag=${GITHUB_REF_NAME}"
            echo "sha=${GITHUB_SHA}"
            echo "plugin_version=${PLUGIN_VERSION}"
            echo "runner=${RUNNER_NAME}"
            echo "mutates_user_scope=true"
            echo "scope=disposable GitHub-hosted runner"
            echo "isolated_home=true"
            date -u +"completed_at=%Y-%m-%dT%H:%M:%SZ"
          } > .metrics/release-install-smoke/context.txt
      - name: Upload isolated install smoke evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-live-inputs
          path: .metrics/release-install-smoke/
          include-hidden-files: true

  assemble-release-evidence:
    name: Assemble Release Evidence
    runs-on: ubuntu-latest
    needs:
      - validate
      - claude-live-validation
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: release-validation-inputs
          path: .metrics/aggregate/validation
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: release-live-inputs
          path: .metrics/aggregate/live
      - name: Generate canonical release evidence
        run: >-
          node scripts/generate-release-evidence.mjs
          --coverage-summary .metrics/aggregate/validation/coverage-summary.txt
          --coverage-metadata .metrics/aggregate/validation/coverage-metadata.json
          --timings .metrics/aggregate/validation/validation-timings.json
          --checksums .metrics/aggregate/validation/SHA256SUMS.txt
          --install .metrics/aggregate/live/inventory.json
          --route .metrics/aggregate/live/route-smoke.json
          --out-dir .metrics/release-evidence
          --require-live
      - name: Publish GitHub Step Summary
        run: cat .metrics/release-evidence/release-evidence.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload canonical release evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-evidence
          path: .metrics/release-evidence/
          include-hidden-files: true

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - assemble-release-evidence
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
      - name: Prepare validated release metadata
        id: release
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: node scripts/prepare-release.mjs
      - name: Generate release checksums
        run: node scripts/generate-release-checksums.mjs
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: release-evidence
          path: .metrics/release-evidence
      - name: Create GitHub Release
        uses: softprops/action-gh-release@7c4723f7a335432393329f8f1c564994ce50185d # v3
        with:
          name: "nova-plugin v${{ steps.release.outputs.version }}"
          body_path: ${{ steps.release.outputs.notes_file }}
          files: |
            .metrics/release-checksums/SHA256SUMS.txt
            .metrics/release-evidence/release-evidence.json
            .metrics/release-evidence/release-evidence.md
          draft: false
          prerelease: ${{ steps.release.outputs.prerelease }}
