name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  validate:
    name: Pre-release Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Maintainer validation
        env:
          NOVA_VALIDATE_WRITE_TIMINGS: '1'
        run: npm run validate:maintainer
      - name: Plugin install dry run
        run: node scripts/validate-plugin-install.mjs --dry-run
      - name: Write release validation evidence
        if: always()
        run: |
          mkdir -p .codex .metrics/release-validation
          {
            echo "# Release Validation Evidence"
            echo
            echo "- workflow: ${GITHUB_WORKFLOW}"
            echo "- run_id: ${GITHUB_RUN_ID}"
            echo "- ref: ${GITHUB_REF}"
            echo "- sha: ${GITHUB_SHA}"
            echo "- generated_at: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo
            echo "## Commands"
            echo
            echo '```text'
            echo "NOVA_VALIDATE_WRITE_TIMINGS=1 npm run validate:maintainer"
            echo "node scripts/validate-plugin-install.mjs --dry-run"
            echo '```'
            if [ -f .metrics/validation-timings.json ]; then
              echo
              echo "## Validation Timings"
              echo
              echo '```json'
              cat .metrics/validation-timings.json
              echo '```'
            fi
          } > .codex/release-validation-evidence.md
      - name: Upload release validation evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-validation-evidence
          path: |
            .codex/release-validation-evidence.md
            .metrics/validation-timings.json

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - name: Validate tag matches plugin version
        run: |
          TAG_VERSION="${{ steps.version.outputs.version }}"
          PLUGIN_VERSION="$(node -e "process.stdout.write(require('./nova-plugin/.claude-plugin/plugin.json').version)")"
          if [ "$TAG_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match plugin version $PLUGIN_VERSION" >&2
            exit 1
          fi
      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract the section between ## [VERSION] and the next ## [
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$(printf '%s' "$NOTES" | tr -d '[:space:]')" ]; then
            echo "CHANGELOG.md has no release notes for $VERSION" >&2
            exit 1
          fi
          # Write to file to handle multiline
          echo "$NOTES" > /tmp/release-notes.md
          echo "notes_file=/tmp/release-notes.md" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "nova-plugin v${{ steps.version.outputs.version }}"
          body_path: ${{ steps.changelog.outputs.notes_file }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
