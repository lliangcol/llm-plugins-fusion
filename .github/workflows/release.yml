name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  validate:
    name: Pre-release Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nova-plugin-command-generator/package-lock.json
      - name: Schema validation
        run: node scripts/validate-schemas.mjs
      - name: Agent count verification
        run: bash scripts/verify-agents.sh
      - name: Lint
        run: cd nova-plugin-command-generator && npm ci && npm run lint
      - name: Test
        run: cd nova-plugin-command-generator && npm run test

  build:
    name: Build Command Generator
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nova-plugin-command-generator/package-lock.json
      - run: cd nova-plugin-command-generator && npm ci && npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: command-generator-dist
          path: nova-plugin-command-generator/dist/
          retention-days: 7

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract the section between ## [VERSION] and the next ## [
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          # Write to file to handle multiline
          echo "$NOTES" > /tmp/release-notes.md
          echo "notes_file=/tmp/release-notes.md" >> $GITHUB_OUTPUT
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: command-generator-dist
          path: /tmp/dist
      - name: Create release archive
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          zip -r /tmp/command-generator-$VERSION.zip /tmp/dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "nova-plugin v${{ steps.version.outputs.version }}"
          body_path: ${{ steps.changelog.outputs.notes_file }}
          files: /tmp/command-generator-${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
