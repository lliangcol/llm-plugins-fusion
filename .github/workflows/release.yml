name: Stable Release Trigger

on:
  workflow_dispatch:
    inputs:
      stable-tag:
        description: Existing signed immutable stable tag to recover
        required: true
        type: string
      candidate-tag:
        description: Exact signed immutable release candidate to promote
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: stable-release-${{ inputs.stable-tag }}-${{ inputs.candidate-tag }}
  cancel-in-progress: false

jobs:
  recover:
    if: ${{ startsWith(inputs.stable-tag, 'v') && !contains(inputs.stable-tag, '-') && startsWith(inputs.candidate-tag, format('{0}-rc.', inputs.stable-tag)) }}
    uses: ./.github/workflows/promote-release.yml
    with:
      release-tag: ${{ inputs.stable-tag }}
      candidate-tag: ${{ inputs.candidate-tag }}
    permissions:
      contents: write
      checks: read
      id-token: write
      attestations: write
