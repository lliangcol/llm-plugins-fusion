name: Stable Release Trigger

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

concurrency:
  group: stable-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  promote:
    if: ${{ !contains(github.ref_name, '-') }}
    uses: ./.github/workflows/promote-release.yml
    permissions:
      contents: write
      checks: read
      id-token: write
      attestations: write
    secrets: inherit
