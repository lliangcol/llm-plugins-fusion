name: Release Recovery Drill

on:
  workflow_dispatch:
    inputs:
      stable-tag:
        description: Exact stable tag represented by the candidate
        required: true
        type: string
      candidate-tag:
        description: Exact signed immutable candidate tag
        required: true
        type: string
      source-commit:
        description: Exact 40-character candidate source commit
        required: true
        type: string

permissions:
  contents: read
  attestations: read

concurrency:
  group: release-recovery-${{ inputs.candidate-tag }}
  cancel-in-progress: false

jobs:
  recover:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.candidate-tag }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Authenticate, safely extract, and replay bound control
        env:
          GH_TOKEN: ${{ github.token }}
          STABLE_TAG: ${{ inputs.stable-tag }}
          CANDIDATE_TAG: ${{ inputs.candidate-tag }}
          SOURCE_COMMIT: ${{ inputs.source-commit }}
        run: |
          set -euo pipefail
          git config gpg.format ssh
          git config gpg.ssh.allowedSignersFile .github/release-signers
          test "$(git cat-file -t "refs/tags/${CANDIDATE_TAG}")" = tag
          git verify-tag "${CANDIDATE_TAG}"
          test "${SOURCE_COMMIT}" = "$(git rev-list -n 1 "${CANDIDATE_TAG}")"
          mkdir -p .metrics/recovery/download .metrics/recovery/bundle
          gh release download "${CANDIDATE_TAG}" --dir .metrics/recovery/download --pattern 'nova-plugin-*-candidate-bundle.tar.gz'
          shopt -s nullglob
          bundles=(.metrics/recovery/download/nova-plugin-*-candidate-bundle.tar.gz)
          test "${#bundles[@]}" -eq 1
          bundle="${bundles[0]}"
          gh attestation verify "${bundle}" --repo "${GITHUB_REPOSITORY}" --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/release-candidate.yml" --source-ref "refs/tags/${CANDIDATE_TAG}" --source-digest "${SOURCE_COMMIT}"
          node scripts/extract-release-bundle.mjs --archive "${bundle}" --out .metrics/recovery/bundle
          node scripts/verify-release-promotion.mjs --stable-tag "${STABLE_TAG}" --candidate-tag "${CANDIDATE_TAG}" --commit "${SOURCE_COMMIT}" \
            --manifest .metrics/recovery/bundle/release-candidate.json --candidate-core .metrics/recovery/bundle/candidate-core.json \
            --promotion-intent .metrics/recovery/bundle/promotion-intent.json --control-bundle-manifest .metrics/recovery/bundle/release-control-bundle.manifest.json \
            --bundle-root .metrics/recovery/bundle --artifact-dir .metrics/recovery/bundle/artifacts
          node scripts/release-orchestrator.mjs --mode drill --state DRAFT --target-state PROMOTION_READY \
            --stable-tag "${STABLE_TAG}" --candidate-tag "${CANDIDATE_TAG}" --source-commit "${SOURCE_COMMIT}" \
            --promotion-intent .metrics/recovery/bundle/promotion-intent.json --control-bundle .metrics/recovery/bundle/release-control-bundle.manifest.json \
            --event-dir .metrics/recovery/events --run-id "${GITHUB_RUN_ID}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-recovery-drill-${{ inputs.candidate-tag }}
          path: .metrics/recovery/
