name: Dependency Audit

on:
  schedule:
    - cron: '23 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - run: node scripts/audit-dependencies.mjs --write
      - run: node scripts/audit-dependency-licenses.mjs --write
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: dependency-audit
          path: |
            governance/dependency-audit-evidence.json
            docs/generated/dependency-audit.md
            governance/dependency-license-evidence.json
            docs/generated/dependency-license-audit.md
