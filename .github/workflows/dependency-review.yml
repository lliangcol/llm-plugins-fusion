name: Dependency Review

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check dependency graph availability
        id: dependency-graph
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          response_file="$(mktemp)"
          status="$(
            curl -sS \
              -o "$response_file" \
              -w "%{http_code}" \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPOSITORY}/dependency-graph/compare/${BASE_SHA}...${HEAD_SHA}"
          )"

          if [ "$status" = "200" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$status" = "403" ] || [ "$status" = "404" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Dependency graph is unavailable for ${REPOSITORY} (HTTP ${status}); skipping dependency review. Enable Dependency graph in repository security settings to run this check."
            exit 0
          fi

          cat "$response_file"
          echo "Dependency graph preflight failed with HTTP ${status}."
          exit 1
      - name: Review dependency changes
        if: steps.dependency-graph.outputs.available == 'true'
        uses: actions/dependency-review-action@v4
