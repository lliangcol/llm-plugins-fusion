name: Dependency Review

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: dependency-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Check dependency graph availability
        id: dependency-graph
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPOSITORY: ${{ github.repository }}
          BASE_REPOSITORY: ${{ github.event.pull_request.base.repo.full_name }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          set -euo pipefail

          response_file="$(mktemp)"
          status="$(
            curl -sS \
              -o "$response_file" \
              -w "%{http_code}" \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPOSITORY}/dependency-graph/compare/${BASE_SHA}...${HEAD_SHA}"
          )"

          if [ "$status" = "200" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$status" = "403" ] || [ "$status" = "404" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            if [ "${HEAD_REPOSITORY}" != "${BASE_REPOSITORY}" ]; then
              changed_dependency_surfaces="$(git diff --name-only "${BASE_SHA}...${HEAD_SHA}" | grep -E '(^|/)(package(-lock)?\.json|npm-shrinkwrap\.json|pnpm-lock\.yaml|yarn\.lock|requirements[^/]*\.txt|poetry\.lock|Cargo\.lock|go\.(mod|sum))$|^\.github/workflows/' || true)"
              if [ -z "${changed_dependency_surfaces}" ]; then
                echo "::notice::Dependency graph unavailable for fork PR, but no dependency-bearing surface changed; status=not_applicable."
                exit 0
              fi
              echo "${changed_dependency_surfaces}"
              echo "Dependency review is blocked for this fork PR because the dependency graph is unavailable and dependency-bearing surfaces changed. A maintainer security approval is required."
              exit 1
            fi
            cat "$response_file"
            echo "Dependency graph is unavailable for protected same-repository PR ${REPOSITORY} (HTTP ${status}). Enable Dependency graph in repository security settings instead of silently skipping this required check."
            exit 1
          fi

          cat "$response_file"
          echo "Dependency graph preflight failed with HTTP ${status}."
          exit 1
      - name: Review dependency changes
        if: steps.dependency-graph.outputs.available == 'true'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
