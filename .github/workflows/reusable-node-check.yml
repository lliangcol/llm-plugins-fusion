name: Reusable Node Check

on:
  workflow_call:
    inputs:
      label:
        required: true
        type: string
      command:
        required: true
        type: string
      runner:
        required: false
        type: string
        default: ubuntu-latest
      node-version:
        required: false
        type: string
        default: '20'

permissions:
  contents: read

jobs:
  node-check:
    name: ${{ inputs.label }}
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ inputs.node-version }}
      - run: ${{ inputs.command }}
