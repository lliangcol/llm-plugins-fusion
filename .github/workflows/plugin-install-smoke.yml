name: Plugin Install Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '37 4 * * 2'

permissions:
  contents: read

concurrency:
  group: plugin-install-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  known-good-install-smoke:
    name: Known-good Claude 2.1.205 install inventory on disposable runner
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
      - run: npm ci --ignore-scripts
      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code@2.1.205
      - name: Validate user-scope install path
        run: node scripts/validate-plugin-install.mjs --accept-user-scope-mutation --isolated-home --inventory-out .metrics/plugin-install-smoke/inventory.json
      - name: Record smoke context
        if: always()
        run: |
          mkdir -p .metrics/plugin-install-smoke
          {
            echo "workflow=${GITHUB_WORKFLOW}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "runner=${RUNNER_NAME}"
            echo "mutates_user_scope=true"
            echo "scope=disposable GitHub-hosted runner"
            echo "isolated_home=true"
            date -u +"completed_at=%Y-%m-%dT%H:%M:%SZ"
          } > .metrics/plugin-install-smoke/context.txt
      - name: Upload smoke context
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: plugin-install-smoke-context
          path: .metrics/plugin-install-smoke/

  latest-drift:
    name: Claude Latest Drift
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
      - run: npm ci --ignore-scripts
      - name: Install latest Claude CLI
        run: |
          npm install -g @anthropic-ai/claude-code@latest
          mkdir -p .metrics/plugin-latest-drift
          claude --version | tee .metrics/plugin-latest-drift/claude-version.txt
      - name: Record latest inventory drift
        run: |
          mkdir -p .metrics/plugin-latest-drift
          set -o pipefail
          node scripts/validate-plugin-install.mjs --accept-user-scope-mutation --isolated-home --inventory-out .metrics/plugin-latest-drift/inventory.json 2>&1 | tee .metrics/plugin-latest-drift/run.log
      - name: Upload latest drift evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: claude-latest-drift
          path: .metrics/plugin-latest-drift/
          include-hidden-files: true
      - name: Create or update compatibility drift issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Claude latest compatibility drift"
          issue="$(gh issue list --state open --search "${title} in:title" --json number --jq '.[0].number // empty')"
          body="Scheduled compatibility validation failed in workflow run ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}. Response SLO: 7 days."
          if [ -n "${issue}" ]; then gh issue comment "${issue}" --body "${body}"; else gh issue create --title "${title}" --body "${body}"; fi
      - name: Close recovered compatibility drift issue
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          issue="$(gh issue list --state open --search 'Claude latest compatibility drift in:title' --json number --jq '.[0].number // empty')"
          if [ -n "${issue}" ]; then gh issue close "${issue}" --comment "Compatibility recovered in run ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}."; fi
